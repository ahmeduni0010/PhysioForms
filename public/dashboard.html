<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhysioForms - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <h1>PhysioForms Dashboard</h1>
            <div class="user-controls">
                <span id="welcome-user">Doctor Portal</span>
                <button id="logout-btn" class="btn-secondary">Logout</button>
            </div>
        </div>
    </header>

    <main class="dashboard-layout">
        <section class="form-section">
            <div class="card">
                <h3>Register New Patient</h3>
                <div id="form-error" class="error-banner hidden"></div>
                <div id="form-success" class="success-banner hidden"></div>
                
                <form id="add-patient-form">
                    <div class="form-group">
                        <label for="patient-name">Patient Name</label>
                        <input type="text" id="patient-name" placeholder="Full name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="patient-age">Age</label>
                        <input type="number" id="patient-age" placeholder="Age" required min="1" max="120">
                    </div>
                    
                    <div class="form-group">
                        <label>Clinical Details & Notes (Points)</label>
                        <div id="details-points-container">
                            <div class="point-input-row">
                                <input type="text" class="patient-detail-point" placeholder="Enter clinical note point..." required>
                            </div>
                        </div>
                        <button type="button" id="add-point-btn" class="btn-text">Add Detail Point</button>
                    </div>
                    
                    <button type="submit" class="btn-primary">Create Patient Profile</button>
                </form>
            </div>
        </section>

        <section class="cards-section">
            <h3>Active Patients Directory</h3>
            <div id="patients-loading" class="loading-text">Loading client records...</div>
            <div id="patients-grid" class="patients-grid"></div>
        </section>
    </main>

    <!-- EDIT PROFILE MODAL DIALOG OVERLAY -->
    <div id="edit-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <h3>Modify Patient Profile</h3>
            <div id="modal-error" class="error-banner hidden"></div>
            <form id="edit-patient-form">
                <input type="hidden" id="edit-patient-id">
                <div class="form-group">
                    <label for="edit-name">Patient Name</label>
                    <input type="text" id="edit-name" required>
                </div>
                <div class="form-group">
                    <label for="edit-age">Age</label>
                    <input type="number" id="edit-age" required min="1" max="120">
                </div>
                <div class="form-group">
                    <label>Clinical Details & Notes (Points)</label>
                    <div id="edit-points-container"></div>
                    <button type="button" id="edit-add-point-btn" class="btn-text">Add Detail Point</button>
                </div>
                <div class="modal-footer">
                    <button type="button" id="close-modal-btn" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary" style="width: auto;">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
